<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RainScape Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌸 LOGIN -->
<div id="loginPage">
  <div class="glass login-card">
    <h2>Welcome 💖</h2>
    <input id="name" placeholder="Your Name">
    <input id="contact" placeholder="Email / Phone">
    <button onclick="sendOTP()">Send OTP</button>
    <input id="otp" placeholder="Enter OTP">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- 🌧️ APP -->
<div id="app">

<div class="navbar">
  <h1 id="title">🌧️ RainScape</h1>
  <select id="language" onchange="changeLang()">
    <option value="en">EN</option>
    <option value="hi">HI</option>
    <option value="es">ES</option>
    <option value="fr">FR</option>
    <option value="de">DE</option>
    <option value="zh">ZH</option>
    <option value="ja">JA</option>
    <option value="ru">RU</option>
    <option value="ar">AR</option>
    <option value="pt">PT</option>
  </select>
</div>

<div class="container">

<div class="card neu">

<h2 id="heading">Check Weather</h2>

<input id="locationInput" placeholder="Enter city">

<div class="btns">
<button onclick="checkWeather()" id="checkBtn">Check</button>
<button onclick="getLocation()">📍</button>
<button onclick="startVoice()">🎤</button>
</div>

<div id="loader" class="loader"></div>
<div id="weather"></div>
<div id="alertBox"></div>

<div class="risk">
<div id="riskBar"></div>
</div>

<div id="suggestion"></div>

</div>

<div id="map"></div>

</div>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div id="chatWindow" class="chatbot hidden">
  <div id="chatbox"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

<div id="rainEffect"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
