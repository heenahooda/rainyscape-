<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RainScape</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: 'Poppins'; }

/* Glass */
.glass {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 20px;
}

/* Login */
#loginPage {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#1e293b,#0f172a);
}

/* App hidden initially */
#app { display: none; }

/* Map */
#map { height: 350px; border-radius: 20px; }

/* Chat */
.chatbot { position: fixed; bottom: 80px; right: 20px; width: 300px; }
.chat-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; }
.hidden { display: none; }

.loader {
  border: 4px solid #ccc;
  border-top: 4px solid #3b82f6;
  border-radius: 50%;
  width: 25px; height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
  display: none;
}
@keyframes spin {100%{transform:rotate(360deg);}}

#riskBar { height:100%; width:0%; border-radius:10px; transition:.5s;}
</style>
</head>

<body>

<!-- 🌸 LOGIN PAGE -->
<div id="loginPage">
  <div class="glass p-8 text-center text-white w-80">
    <h2 class="text-2xl mb-4">Welcome 💖</h2>

    <input id="name" placeholder="Your Name" class="w-full p-2 rounded text-black mb-2">
    <input id="contact" placeholder="Email or Phone" class="w-full p-2 rounded text-black mb-2">

    <button onclick="sendOTP()" class="bg-blue-500 w-full p-2 rounded mb-2">Send OTP</button>

    <input id="otp" placeholder="Enter OTP" class="w-full p-2 rounded text-black mb-2">

    <button onclick="login()" class="bg-green-500 w-full p-2 rounded">Login</button>
  </div>
</div>

<!-- 🌧️ MAIN APP -->
<div id="app" class="bg-gradient-to-br from-slate-900 to-slate-700 text-white min-h-screen">

<div class="flex justify-between px-6 py-4 bg-black/30">
  <h1 id="title">🌧️ RainScape</h1>

  <select id="language" onchange="changeLang()" class="text-black">
    <option value="en">EN</option>
    <option value="hi">HI</option>
    <option value="es">ES</option>
    <option value="fr">FR</option>
    <option value="de">DE</option>
    <option value="zh">ZH</option>
    <option value="ja">JA</option>
    <option value="ru">RU</option>
    <option value="ar">AR</option>
    <option value="pt">PT</option>
  </select>
</div>

<div class="grid md:grid-cols-2 gap-6 p-6">

<div class="glass p-6 text-center">
  <h2 id="heading">Check Weather</h2>

  <input id="locationInput" class="p-2 rounded text-black w-full" placeholder="Enter city">

  <button onclick="checkWeather()" id="checkBtn" class="bg-blue-500 mt-2 px-3 py-2 rounded">Check</button>

  <div id="loader" class="loader"></div>

  <div id="weather"></div>
  <div id="alertBox"></div>

  <div class="bg-gray-700 h-2 mt-2">
    <div id="riskBar"></div>
  </div>

  <div id="suggestion"></div>
</div>

<div id="map"></div>

</div>

<button class="chat-toggle bg-blue-500" onclick="toggleChat()">💬</button>

<div id="chatWindow" class="chatbot glass p-3 hidden">
  <div id="chatbox" class="h-32 overflow-y-auto bg-black p-2"></div>
  <input id="chatInput" class="w-full p-2 text-black">
  <button onclick="sendMessage()" class="bg-blue-500 w-full mt-2 p-2">Send</button>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
