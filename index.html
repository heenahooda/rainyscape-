<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RainScape</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body class="dark-mode bg-gradient-to-br from-slate-900 to-slate-700">

<!-- Navbar -->
<div class="flex justify-between items-center px-6 py-4 bg-black/30 backdrop-blur-md">
  <h1 class="text-2xl font-bold">🌧️ RainScape</h1>

  <div class="flex items-center gap-4">
    <button onclick="toggleMode()">🌙</button>
    <select id="language" onchange="changeLang()" class="text-black rounded px-2">
      <option value="en">EN</option>
      <option value="hi">HI</option>
    </select>
  </div>
</div>

<!-- Main -->
<div class="grid md:grid-cols-2 gap-6 p-6">

  <!-- Weather Card -->
  <div class="glass p-6 text-center">

    <h2 class="text-xl mb-3">Check Weather</h2>

    <input id="locationInput" class="p-2 rounded text-black w-full mb-3" placeholder="Enter city">

    <div class="flex justify-center gap-2">
      <button onclick="checkWeather()" class="bg-blue-500 px-3 py-2 rounded">Check</button>
      <button onclick="getLocation()" class="bg-green-500 px-3 py-2 rounded">📍</button>
      <button onclick="startVoice()" class="bg-purple-500 px-3 py-2 rounded">🎤</button>
    </div>

    <div id="loader" class="loader mt-3"></div>

    <div id="weather" class="mt-4 text-lg"></div>
    <div id="alertBox" class="mt-2 p-2 rounded"></div>

    <div class="bg-gray-700 mt-3 rounded h-2">
      <div id="riskBar"></div>
    </div>

    <div id="suggestion" class="mt-2 text-sm opacity-80"></div>

  </div>

  <!-- Map -->
  <div id="map"></div>

</div>

<!-- Chat -->
<button class="chat-toggle bg-blue-500 text-white" onclick="toggleChat()">💬</button>

<div id="chatWindow" class="chatbot glass p-3 hidden">
  <div id="chatbox" class="h-32 overflow-y-auto bg-black text-white p-2 mb-2 rounded"></div>
  <input id="chatInput" class="w-full p-2 text-black rounded">
  <button onclick="sendMessage()" class="bg-blue-500 w-full mt-2 p-2 rounded">Send</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
